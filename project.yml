name: ChillMac
options:
  bundleIdPrefix: com.idevtim
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ChillMac:
    type: application
    platform: macOS
    sources:
      - path: ChillMac
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.idevtim.ChillMac
        INFOPLIST_FILE: ChillMac/Info.plist
        CODE_SIGN_ENTITLEMENTS: ChillMac/ChillMac.entitlements
        CODE_SIGN_IDENTITY: "Developer ID Application: Tim Murphy (UA2RJP3TSL)"
        DEVELOPMENT_TEAM: UA2RJP3TSL
        CODE_SIGN_STYLE: Manual
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - target: com.idevtim.ChillMac.Helper
        embed: false
        codeSign: false
    postCompileScripts:
      - name: "Copy Helper Tool"
        script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchServices"
          cp "${BUILT_PRODUCTS_DIR}/com.idevtim.ChillMac.Helper" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchServices/"
        inputFiles: []
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchServices/com.idevtim.ChillMac.Helper"

  com.idevtim.ChillMac.Helper:
    type: tool
    platform: macOS
    sources:
      - path: FanControlHelper
      - path: Shared
      - path: ChillMac/SMC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.idevtim.ChillMac.Helper
        PRODUCT_NAME: com.idevtim.ChillMac.Helper
        INFOPLIST_FILE: FanControlHelper/Info.plist
        CODE_SIGN_IDENTITY: "Developer ID Application: Tim Murphy (UA2RJP3TSL)"
        DEVELOPMENT_TEAM: UA2RJP3TSL
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        INFOPLIST_OTHER_PREPROCESSOR_FLAGS: ""
        OTHER_LDFLAGS: "-sectcreate __TEXT __launchd_plist $(SRCROOT)/FanControlHelper/Launchd.plist"
